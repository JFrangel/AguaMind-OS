[project]
name = "agentos-data"
version = "0.1.0"
description = "DataFrames, vectorized calculations, linear algebra"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.2.0",
    "polars>=1.0.0",
    "numpy>=2.0.0",
    "scipy>=1.14.0",
    "openpyxl>=3.1.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
