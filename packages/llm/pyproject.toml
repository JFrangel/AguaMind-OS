[project]
name = "agentos-llm"
version = "0.1.0"
description = "LLM AdapterFactory with cascade and circuit breaker failover"
requires-python = ">=3.11"
dependencies = [
    "groq>=0.13.0",
    "openai>=1.60.0",
    "google-genai>=1.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
