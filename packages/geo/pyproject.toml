[project]
name = "agentos-geo"
version = "0.1.0"
description = "Geocoding and PostGIS spatial queries"
requires-python = ">=3.11"
dependencies = [
    "geopy>=2.4.0",
    "asyncpg>=0.30.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
