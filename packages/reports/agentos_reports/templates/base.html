<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Inter', 'Helvetica Neue', sans-serif; margin: 40px; color: #212529; line-height: 1.6; }
    h1 { color: #4263eb; border-bottom: 2px solid #4263eb; padding-bottom: 8px; }
    h2 { color: #343a40; margin-top: 24px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th { background: #f1f3f5; padding: 8px 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
    td { padding: 8px 12px; border-bottom: 1px solid #e9ecef; }
    .metric { display: inline-block; background: #e6fcf5; padding: 8px 16px; border-radius: 8px; margin: 4px; }
    .metric-value { font-size: 24px; font-weight: bold; color: #087f5b; }
    .metric-label { font-size: 12px; color: #868e96; }
    img { max-width: 100%; height: auto; }
    .footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #dee2e6; font-size: 12px; color: #868e96; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <div class="footer">Generated by AgentOS | {{ timestamp | default('') }}</div>
</body>
</html>
