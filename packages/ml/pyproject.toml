[project]
name = "agentos-ml"
version = "0.1.0"
description = "Anomaly detection and ML pipeline"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn>=1.6.0",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
