[project]
name = "agentos-database"
version = "0.1.0"
description = "Multi-DB adapter (PostgreSQL/MySQL/SQLite) with schema introspection + safe query executor"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.29"]
mysql    = ["aiomysql>=0.2"]
sqlite   = ["aiosqlite>=0.20"]
all      = ["asyncpg>=0.29", "aiomysql>=0.2", "aiosqlite>=0.20"]
dev      = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
