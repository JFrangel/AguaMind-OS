name: agentos-api

services:
  - name: api
    type: web
    docker:
      dockerfile: services/api/Dockerfile
    instance_type: nano
    regions:
      - fra
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    health_checks:
      - http:
          port: 8000
          path: /health
        grace_period: 30
        interval: 30
    scalings:
      - min: 1
        max: 1
    env:
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        secret: groq-api-key
      - key: OPENROUTER_API_KEY
        secret: openrouter-api-key
      - key: GEMINI_API_KEY
        secret: gemini-api-key
      - key: SUPABASE_URL
        secret: supabase-url
      - key: SUPABASE_SERVICE_KEY
        secret: supabase-service-key
      - key: DATABASE_URL
        secret: database-url
      - key: VECTOR_BACKEND
        value: pgvector
      - key: AUTH_REQUIRED
        value: "false"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
