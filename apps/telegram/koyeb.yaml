name: agentos-telegram

services:
  - name: bot
    type: worker
    docker:
      dockerfile: apps/telegram/Dockerfile
    instance_type: nano
    regions:
      - fra
    scalings:
      - min: 1
        max: 1
    env:
      - key: TELEGRAM_BOT_TOKEN
        secret: telegram-bot-token
      - key: BACKEND_URL
        value: https://agentos-api.koyeb.app
